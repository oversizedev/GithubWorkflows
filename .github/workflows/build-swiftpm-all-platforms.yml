name: Build Packages

on:
  workflow_dispatch:
    inputs:
      package:
        type: string
        description: Build package names
        required: true
        
  workflow_call:
    inputs:
      package:
        type: string
        description: Build package names
        required: true
        
env:
  DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer

jobs:
  build:
    name: Build
    runs-on: macOS-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup environment variable
        run: echo "BUILD_MODE=PRODUCTION" >> $GITHUB_ENV
        
      - name: Setup SwiftPM Config
        run: |
          echo "machine github.com login oversizedev password ${{ secrets.ACTIONS_TOKEN }}" > ~/.netrc
          chmod 600 ~/.netrc
          set -euo pipefail
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES

      - name: Build iOS Package
        run: |
          xcodebuild clean build -skipPackagePluginValidation -scheme ${{ inputs.package }} -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.2' | xcpretty && exit ${PIPESTATUS[0]}
          
      - name: Build macOS Package
        run: |
          xcodebuild clean build -skipPackagePluginValidation -scheme ${{ inputs.package }} -destination 'platform=macOS,arch=arm64' | xcpretty && exit ${PIPESTATUS[0]}
          
      - name: Build watchOS Package
        run: |
          xcodebuild clean build -skipPackagePluginValidation -scheme ${{ inputs.package }} -destination 'platform=watchOS Simulator,name=Apple Watch SE 3 (40mm),OS=26.2' | xcpretty && exit ${PIPESTATUS[0]}
          
      - name: Build tvOS Package
        run: |
          xcodebuild clean build -skipPackagePluginValidation -scheme ${{ inputs.package }} -destination 'platform=tvOS Simulator,name=Apple TV 4K (3rd generation) (at 1080p),OS=26.2' | xcpretty && exit ${PIPESTATUS[0]}
